<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="style.css" rel="stylesheet" />
    <title>The guessing game!</title>
  </head>
  <body>
    <header class="header">
      <h1 class="title">Guess a number!</h1>
    </header>
    <article>
      <h2>Choose a number between 1 and 12</h2>
      <p class="attempt-counter">Attempts left: 5</p>
      <p class="progress-tracker">click to start...</p>
    </article>

    <section class="btn-section">
      <button class="btn btn-play btn-1">1</button>
      <button class="btn btn-play btn-2">2</button>
      <button class="btn btn-play btn-3">3</button>
      <button class="btn btn-play btn-4">4</button>
      <button class="btn btn-play btn-5">5</button>
      <button class="btn btn-play btn-6">6</button>
      <button class="btn btn-play btn-7">7</button>
      <button class="btn btn-play btn-8">8</button>
      <button class="btn btn-play btn-9">9</button>
      <button class="btn btn-play btn-10">10</button>
      <button class="btn btn-play btn-11">11</button>
      <button class="btn btn-play btn-12">12</button>
    </section>
    <section class="reset-section">
      <button class="btn btn-reset">Reset</button>
    </section>
    <footer class="footer"></footer>

    <script src="game.js"></script>
  </body>
</html>
